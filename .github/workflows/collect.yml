name: 每日数据采集 (每2小时)

on:
  schedule:
    # 北京时间 8:00~22:00 每2小时 → UTC
    - cron: '0 0 * * *'   # 08:00
    - cron: '0 2 * * *'   # 10:00
    - cron: '0 4 * * *'   # 12:00
    - cron: '0 6 * * *'   # 14:00
    - cron: '0 8 * * *'   # 16:00
    - cron: '0 10 * * *'  # 18:00
    - cron: '0 12 * * *'  # 20:00
    - cron: '0 14 * * *'  # 22:00
  workflow_dispatch:   # 支持 GitHub 网页上手动触发

# 权限：推送代码 + 部署 Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # 让 GitHub Pages 部署环境生效
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 采集数据
        run: python main.py

      - name: 提交并推送数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ site/data.js
          if git diff --staged --quiet; then
            echo "没有新的数据变更，跳过提交"
          else
            git commit -m "数据采集 $(TZ='Asia/Shanghai' date +%Y-%m-%d_%H:%M)"
            git push
          fi

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
